name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate release version
        id: version
        shell: pwsh
        run: .\.github\scripts\validate-release-version.ps1 -TagName "${{ github.ref_name }}"

      - name: Build frontend
        run: bun run build

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Lint Rust
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test Rust
        working-directory: src-tauri
        run: cargo test

      - name: Build installer
        run: bun run tauri build

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $bundleDir = Join-Path $PWD "src-tauri\target\release\bundle\nsis"
          $installers = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe"
          if ($installers.Count -ne 1) {
            throw "Expected exactly one installer in '$bundleDir', found $($installers.Count)."
          }

          $installer = $installers[0]
          $hash = Get-FileHash -Algorithm SHA256 -Path $installer.FullName
          $checksumPath = "$($installer.FullName).sha256"
          "$($hash.Hash.ToLowerInvariant()) *$($installer.Name)" | Set-Content -Path $checksumPath -NoNewline

          "installer_path=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "checksum_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo "${{ github.repository }}" `
              --verify-tag `
              --title "Ferrlock $tag" `
              --generate-notes
          }

          gh release upload $tag `
            "${{ steps.assets.outputs.installer_path }}" `
            "${{ steps.assets.outputs.checksum_path }}" `
            --repo "${{ github.repository }}" `
            --clobber
